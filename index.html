        { id: 56, year: 2019, category: "Vocabulary", question: "At _______ time, there is always plenty of work to do on a farm.", options: ["production", "profit", "plant", "harvest"], answer: "harvest", explanation: "'Harvest time' (រដូវប្រមូលផល)។" },
        { id: 57, year: 2019, category: "Vocabulary", question: "It is against the _______ not to wear seat belt in a plane.", options: ["rule", "regulation", "law", "order"], answer: "law", explanation: "'Law' (ច្បាប់)។" },
        { id: 58, year: 2019, category: "Vocabulary", question: "Everything in the sale has been _______ to half price.", options: ["reduced", "decreased", "bargained", "lowered"], answer: "reduced", explanation: "'Reduced' (បញ្ចុះតម្លៃ)។" },
        { id: 59, year: 2019, category: "Vocabulary", question: "I _______ to inform you that your grandmother died ten minutes ago.", options: ["apologise", "sorry", "pity", "regret"], answer: "regret", explanation: "'Regret to inform' (សោកស្តាយក្នុងការជម្រាប)។" },
        { id: 60, year: 2019, category: "Vocabulary", question: "We were unable to reach an agreement because of the _______ between the two groups.", options: ["contact", "concern", "connection", "conflict"], answer: "conflict", explanation: "'Conflict' (ជម្លោះ)។" },
        // 2018
      // Grammar
        { id: 61, year: 2018, category: "Grammar", question: "We haven't got _______ money to buy a new car yet.", options: ["quite", "too much", "too many", "enough"], answer: "enough", explanation: "'Enough money' (លុយគ្រប់គ្រាន់)។" },
        { id: 62, year: 2018, category: "Grammar", question: "The person _______ my hair usually does a very good job.", options: ["who he cuts", "who cuts", "cuts", "cuts it"], answer: "who cuts", explanation: "Relative Clause: 'Who' ជាប្រធាន។" },
        { id: 63, year: 2018, category: "Grammar", question: "We _______ to the baseball game when it started to rain.", options: ["are driving", "drives", "driven", "were driving"], answer: "were driving", explanation: "Past Continuous (were driving) ត្រូវរំខានដោយ Past Simple (started)។" },
        { id: 64, year: 2018, category: "Grammar", question: "The new bridge _______ before the end of next month.", options: ["will be completed", "will complete", "is completed", "completes"], answer: "will be completed", explanation: "Future Passive: will be completed (នឹងត្រូវសាងសង់រួច)។" },
        { id: 65, year: 2018, category: "Grammar", question: "Their marriage wouldn't be so good if they _______ so well with each other.", options: ["communicated", "didn't communicate", "don't communicate", "communicate"], answer: "didn't communicate", explanation: "Mixed/Second Conditional: If clause (didn't communicate), Main clause (wouldn't be)។" },
        // Vocabulary
        { id: 66, year: 2018, category: "Vocabulary", question: "I saw a nasty _______ between two cars this morning.", options: ["damage", "danger", "accident", "happening"], answer: "accident", explanation: "'Nasty accident' (គ្រោះថ្នាក់អាក្រក់)។" },
        { id: 67, year: 2018, category: "Vocabulary", question: "All medicines should be kept out of _______ of children.", options: ["hand", "touch", "contact", "reach"], answer: "reach", explanation: "'Out of reach' (ផុតដៃក្មេង)។" },
        { id: 68, year: 2018, category: "Vocabulary", question: "Everything in the sale has been _______ to half price.", options: ["reduced", "decreased", "bargained", "lowered"], answer: "reduced", explanation: "'Reduced' (បញ្ចុះ)។" },
        { id: 69, year: 2018, category: "Vocabulary", question: "At work, Vuthy always arrives on time, he's so _______.", options: ["timeless", "punctual", "boring", "careful"], answer: "punctual", explanation: "'Punctual' (ទៀងពេលវេលា)។" },
        { id: 70, year: 2018, category: "Vocabulary", question: "It'll take you over an hour to get to the city centre in _______ hour.", options: ["rush", "busy", "run", "crowded"], answer: "rush", explanation: "'Rush hour' (ម៉ោងស្ទះចរាចរណ៍/មមាញឹក)។" },
        // 2017
       // Grammar
        { id: 71, year: 2017, category: "Grammar", question: "Girls, you _______ say those things about your teachers.", options: ["mustn't", "haven't to", "haven't", "mustn't to"], answer: "mustn't", explanation: "'Mustn't' (ហាមដាច់ខាត)។" },
        { id: 72, year: 2017, category: "Grammar", question: "Have another piece of cake. No, thanks, _______ too much.", options: ["I've ate", "I ate", "I eaten", "I've eaten"], answer: "I've eaten", explanation: "Present Perfect: I've eaten (ញ៉ាំរួចហើយ)។" },
        { id: 73, year: 2017, category: "Grammar", question: "I was going to do the washing, but the machine _______ down.", options: ["broke", "breaks", "broken", "break"], answer: "broke", explanation: "Past Simple (broke)។" },
        { id: 74, year: 2017, category: "Grammar", question: "My secretary was late. She had never _______ late before.", options: ["was", "had", "came", "been"], answer: "been", explanation: "Past Perfect: She had never been late (មិនដែលយឺតសោះពីមុន)។" },
        { id: 75, year: 2017, category: "Grammar", question: "If you give some money, I _______ to go shopping.", options: ["can", "could", "will be able", "will can"], answer: "will be able", explanation: "Future Ability: will be able to។" },
        // Vocabulary
        { id: 76, year: 2017, category: "Vocabulary", question: "Before you begin the exam paper, always read the _______ carefully.", options: ["orders", "instruction", "rules", "answers"], answer: "instruction", explanation: "'Read the instruction' (អានសេចក្តីណែនាំ)។" },
        { id: 77, year: 2017, category: "Vocabulary", question: "If you put your money in the bank, it will earn ten percent _______.", options: ["interest", "profit", "deposit", "investment"], answer: "interest", explanation: "'Interest' (ការប្រាក់)។" },
        { id: 78, year: 2017, category: "Vocabulary", question: "Most people in the town _______ the idea of Green and Clean city.", options: ["agree", "approve", "support", "believe"], answer: "support", explanation: "'Support the idea' (គាំទ្រគំនិត)។" },
        { id: 79, year: 2017, category: "Vocabulary", question: "The plane was delayed by fog, and so I _______ my connection.", options: ["lost", "abandoned", "forget", "missed"], answer: "missed", explanation: "'Missed connection' (ខកជើងយន្តហោះ)។" },
        { id: 80, year: 2017, category: "Vocabulary", question: "The fans climbed over the fence to _______ paying.", options: ["avoid", "prevent", "abandon", "refuse"], answer: "avoid", explanation: "'Avoid paying' (គេចវេះពីការបង់លុយ)។" },
        // 2016
       // Grammar
        { id: 81, year: 2016, category: "Grammar", question: "You must have something to eat before _______ to school.", options: ["go", "going", "to go", "of go"], answer: "going", explanation: "Before + V-ing (Gerund)។" },
        { id: 82, year: 2016, category: "Grammar", question: "You have never seen this before, _______ you?", options: ["haven't", "don't", "do", "have"], answer: "have", explanation: "Have never seen (Negative) -> have you (Positive)។" },
        { id: 83, year: 2016, category: "Grammar", question: "This problem _______ by this clever boy last night.", options: ["will be solved", "is solved", "was solved", "solved"], answer: "was solved", explanation: "Passive Voice (Past Simple): was solved។" },
        { id: 84, year: 2016, category: "Grammar", question: "What _______ you do if you won a lot of money?", options: ["will", "must", "would", "have"], answer: "would", explanation: "Second Conditional: If + won (Past), ... would + V1។" },
        { id: 85, year: 2016, category: "Grammar", question: "She was cleaning her teeth when the phone _______.", options: ["was going to ring", "was ringing", "rang", "ring"], answer: "rang", explanation: "Past Continuous (was cleaning) ... when ... Past Simple (rang)។" },
        // Vocabulary
        { id: 86, year: 2016, category: "Vocabulary", question: "What are you going to do when you _______ school?", options: ["conclude", "end", "complete", "leave"], answer: "leave", explanation: "'Leave school' (បញ្ចប់ការសិក្សា)។" },
        { id: 87, year: 2016, category: "Vocabulary", question: "The hotel services are bad, so we should write a _______ to the manager.", options: ["complaint", "message", "information", "essay"], answer: "complaint", explanation: "'Write a complaint' (សរសេរពាក្យបណ្ដឹង)។" },
        { id: 88, year: 2016, category: "Vocabulary", question: "Bopha cried out with _______ at the beautiful present Mr. Kimseng gave her.", options: ["depress", "horror", "anger", "delight"], answer: "delight", explanation: "'Delight' (សេចក្តីរីករាយ)។" },
        { id: 89, year: 2016, category: "Vocabulary", question: "Is it possible to _______ now for next term's evening classes?", options: ["send", "enroll", "join in", "enter"], answer: "enroll", explanation: "'Enroll' (ចុះឈ្មោះ)។" },
        { id: 90, year: 2016, category: "Vocabulary", question: "Most parents find it difficult to _______ their children nowadays.", options: ["bring up", "develop", "grow up", "set up"], answer: "bring up", explanation: "'Bring up' (ចិញ្ចឹមបីបាច់)។" },
        // 2015
        // Grammar
        { id: 91, year: 2015, category: "Grammar", question: "Angkor Wat temple _______ by thousands of tourists every month.", options: ["was visited", "visited", "are visited", "is visited"], answer: "is visited", explanation: "Passive Voice (Present Simple): is visited។" },
        { id: 92, year: 2015, category: "Grammar", question: "Mr. Sophal can't talk on the phone because he _______ dinner right now.", options: ["eats", "is eating", "has eaten", "has been eating"], answer: "is eating", explanation: "Present Continuous (is eating)។" },
        { id: 93, year: 2015, category: "Grammar", question: "I _______ the house before you called.", options: ["leave", "had left", "am leaving", "had been leaving"], answer: "had left", explanation: "Past Perfect: had left (បានចាកចេញមុន)។" },
        { id: 94, year: 2015, category: "Grammar", question: "If I found a wallet on the street, I _______ it to police station.", options: ["will take", "take", "would take", "am taking"], answer: "would take", explanation: "Second Conditional: If + found, ... would take។" },
        { id: 95, year: 2015, category: "Grammar", question: "The tree, _______ behind my house, gives a lot of shade.", options: ["grows", "which it grows", "which grows", "it grows"], answer: "which grows", explanation: "Relative Clause: 'Which grows'។" },
        // Vocabulary
        { id: 96, year: 2015, category: "Vocabulary", question: "How much do they _______ for cleaning your room?", options: ["demand", "cost", "charge", "need"], answer: "charge", explanation: "'Charge' (គិតថ្លៃ)។" },
        { id: 97, year: 2015, category: "Vocabulary", question: "In some countries, smoking in public places is _______ because many people are hurt of smoke.", options: ["prohibited", "increased", "encourage", "continued"], answer: "prohibited", explanation: "'Prohibited' (ហាមឃាត់)។" },
        { id: 98, year: 2015, category: "Vocabulary", question: "The government should _______ a law to make computer hacking illegal.", options: ["allow", "enter", "pass", "bring"], answer: "pass", explanation: "'Pass a law' (អនុម័តច្បាប់)។" },
        { id: 99, year: 2015, category: "Vocabulary", question: "The bad weather _______ the flight for several hours.", options: ["postponed", "delayed", "cancelled", "stopped"], answer: "delayed", explanation: "'Delayed' (យឺតយ៉ាវ)។" },
        { id: 100, year: 2015, category: "Vocabulary", question: "In recent years, inflation has almost double the _______ of living.", options: ["price", "expense", "charge", "cost"], answer: "cost", explanation: "'Cost of living' (តម្លៃនៃការរស់នៅ)។" },
        // 2014 (1)
      // Grammar
        { id: 101, year: "2014 (1)", category: "Grammar", question: "Although Ms. Thida _______ reservation, the hotel did not have a room for her.", options: ["made", "has made", "had made", "makes"], answer: "had made", explanation: "Past Perfect: had made (កក់ទុកមុន)។" },
        { id: 102, year: "2014 (1)", category: "Grammar", question: "I _______ on the bus when I dropped my wallet.", options: ["am getting", "have gotten", "get", "was getting"], answer: "was getting", explanation: "Past Continuous: was getting (កំពុងឡើងឡាន)។" },
        { id: 103, year: "2014 (1)", category: "Grammar", question: "Several trees fell down last night _______ the strong wind.", options: ["because of", "since", "because", "so"], answer: "because of", explanation: "'Because of' + Noun Phrase (the strong wind)។" },
        { id: 104, year: "2014 (1)", category: "Grammar", question: "We _______ at that restaurant during the last few months.", options: ["don't eat", "won't eat", "haven't eaten", "didn't eat"], answer: "haven't eaten", explanation: "Present Perfect (haven't eaten) សម្រាប់រយៈពេល។" },
        { id: 105, year: "2014 (1)", category: "Grammar", question: "Mr Dara _______ so many accidents if he drove more carefully.", options: ["would have", "won't have", "would have had", "wouldn't have"], answer: "wouldn't have", explanation: "Second Conditional: If + drove, ... wouldn't have។" },
        // Vocabulary
        { id: 106, year: "2014 (1)", category: "Vocabulary", question: "I'm really _______ of my son who won first prize.", options: ["pleased", "proud", "delighted", "happy"], answer: "proud", explanation: "'Proud of' (មានមោទកភាព)។" },
        { id: 107, year: "2014 (1)", category: "Vocabulary", question: "We all need to _______ responsibility for improving our local community.", options: ["have", "make", "take", "give"], answer: "take", explanation: "'Take responsibility' (ទទួលខុសត្រូវ)។" },
        { id: 108, year: "2014 (1)", category: "Vocabulary", question: "It's important to set yourself clear _______ so you know what you are aiming for.", options: ["ambitions", "opportunities", "decisions", "goals"], answer: "goals", explanation: "'Set goals' (កំណត់គោលដៅ)។" },
        { id: 109, year: "2014 (1)", category: "Vocabulary", question: "According to the weather _______, there will be rain tomorrow.", options: ["programme", "information", "survey", "forecast"], answer: "forecast", explanation: "'Weather forecast' (ការព្យាករណ៍អាកាសធាតុ)។" },
        { id: 110, year: "2014 (1)", category: "Vocabulary", question: "Many people believe that violent computer games can have a harmful _______ on children.", options: ["effect", "affect", "damage", "involvement"], answer: "effect", explanation: "'Effect' (ឥទ្ធិពល)។" },
        // 2014 (2)
       // Grammar
        { id: 111, year: "2014 (2)", category: "Grammar", question: "We _______ with the prime minister for dinner tonight.", options: ["will be met", "have been met", "were met", "are meeting"], answer: "are meeting", explanation: "Present Continuous សម្រាប់គម្រោងការអនាគត។" },
        { id: 112, year: "2014 (2)", category: "Grammar", question: "Mr Sambath _______ his vacation after the project is completed.", options: ["will take", "took", "has taken", "taking"], answer: "will take", explanation: "Future Simple: will take។" },
        { id: 113, year: "2014 (2)", category: "Grammar", question: "Mr Chantha _______ for the day when the phone call came.", options: ["has already left", "already leaves", "already left", "had already left"], answer: "had already left", explanation: "Past Perfect: had already left (បានចាកចេញមុន)។" },
        { id: 114, year: "2014 (2)", category: "Grammar", question: "If we keep _______ like this, we should be done before the deadline.", options: ["working", "worked", "to work", "work"], answer: "working", explanation: "'Keep' + V-ing (working)។" },
        { id: 115, year: "2014 (2)", category: "Grammar", question: "The benefits programme _______ in the next few months.", options: ["had changed", "were changed", "will be changed", "changed"], answer: "will be changed", explanation: "Future Passive: will be changed (នឹងត្រូវផ្លាស់ប្តូរ)។" },
        // Vocabulary
        { id: 116, year: "2014 (2)", category: "Vocabulary", question: "At the age of 60, Mr. Vuth retired and lived off his _______.", options: ["salary", "allowance", "grant", "pension"], answer: "pension", explanation: "'Pension' (ប្រាក់សោធននិវត្តន៍)។" },
        { id: 117, year: "2014 (2)", category: "Vocabulary", question: "Please confirm your reservation in _______.", options: ["letter", "writing", "words", "paper"], answer: "writing", explanation: "'In writing' (ជាលាយលក្ខណ៍អក្សរ)។" },
        { id: 118, year: "2014 (2)", category: "Vocabulary", question: "Everybody knew Samnang had _______ a crime but nobody wanted to tell the police.", options: ["committed", "done", "made", "performed"], answer: "committed", explanation: "'Committed a crime' (ប្រព្រឹត្តបទឧក្រិដ្ឋ)។" },
        { id: 119, year: "2014 (2)", category: "Vocabulary", question: "The researchers _______ many experiments to find the most effective materials.", options: ["considered", "confirmed", "concerned", "conducted"], answer: "conducted", explanation: "'Conducted experiments' (ធ្វើការពិសោធន៍)។" },
        { id: 120, year: "2014 (2)", category: "Vocabulary", question: "I _______ on the news that the price of gas is going up again.", options: ["looked", "listened", "heard", "watched"], answer: "heard", explanation: "'Heard on the news' (បានឮតាមព័ត៌មាន)។" }
    ];

    // --- SUB-COMPONENTS ---

    const WelcomeScreen = ({ onStart, onTips, onExit }) => {
        const [showExitModal, setShowExitModal] = useState(false);

        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center fade-in bg-gradient-to-br from-blue-900 to-indigo-800 text-white w-full relative">
                <div className="mb-8 p-6 bg-white bg-opacity-10 rounded-full shadow-2xl animate-bounce-slow">
                    <i className="fas fa-graduation-cap text-6xl text-yellow-400"></i>
                </div>
                <h1 className="text-4xl md:text-6xl font-bold mb-4 khmer-text text-yellow-300 drop-shadow-md">
                    អង់គ្លេសបាក់ឌុប
                </h1>
                <p className="text-lg md:text-xl mb-8 opacity-90 khmer-text max-w-lg">
                    កម្មវិធីប្រមូលផ្ដុំវិញ្ញាសាបាក់ឌុបចាប់ពីឆ្នាំ ២០១៤-២០២៥
                    <br/>
                    <span className="text-yellow-200 text-sm mt-2 block font-sans">Grammar & Vocabulary Practice</span>
                </p>
                
                <div className="flex flex-col gap-4 w-full max-w-xs">
                    <button 
                        onClick={onStart}
                        className="khmer-text bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 text-xl flex items-center justify-center gap-3"
                    >
                        <i className="fas fa-play"></i> ចាប់ផ្តើមប្រឡង
                    </button>
                    <button 
                        onClick={onTips}
                        className="khmer-text bg-white hover:bg-gray-100 text-blue-900 font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 text-xl flex items-center justify-center gap-3"
                    >
                        <i className="fas fa-lightbulb"></i> គន្លឹះវេយ្យករណ៍ និង វាក្យសព្ទ
                    </button>
                     <button 
                        onClick={() => setShowExitModal(true)}
                        className="khmer-text bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 text-xl flex items-center justify-center gap-3"
                    >
                        <i className="fas fa-sign-out-alt"></i> ចាកចេញ
                    </button>
                </div>

                {/* Exit Modal */}
                {showExitModal && (
                    <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl p-6 max-w-sm w-full text-gray-800 shadow-2xl animate-bounce-slow" style={{animation: 'none'}}>
                            <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i className="fas fa-question text-3xl"></i>
                            </div>
                            <h3 className="text-xl font-bold mb-6 khmer-text text-gray-800">តើអ្នកពិតជាចង់ចាកចេញមែនទេ?</h3>
                            <div className="flex gap-4 justify-center">
                                <button 
                                    onClick={() => setShowExitModal(false)}
                                    className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-xl khmer-text transition w-1/2"
                                >
                                    នៅបន្ត
                                </button>
                                <button 
                                    onClick={onExit}
                                    className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl khmer-text transition w-1/2"
                                >
                                    ចាកចេញ
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                <div className="mt-12 text-sm opacity-60">
                    © 2026 BacII Prep. Updated from Official Exam 2014-2025.
                </div>
            </div>
        );
    };

    const GoodbyeScreen = () => (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4 text-center fade-in w-full">
            <i className="fas fa-hand-holding-heart text-6xl text-pink-500 mb-6 animate-bounce"></i>
            <h1 className="text-4xl font-bold mb-4 khmer-text">សូមអរគុណ!</h1>
            <p className="text-xl opacity-80 mb-8 khmer-text">ជួបគ្នាពេលក្រោយ។</p>
            <button 
                onClick={() => window.location.reload()}
                className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition khmer-text shadow-lg hover:shadow-blue-500/50"
            >
                <i className="fas fa-redo mr-2"></i> ចូលកម្មវិធីម្ដងទៀត
            </button>
        </div>
    );

    // New Component: Tips Menu Screen
    const TipsMenuScreen = ({ onSelectCategory, onBack }) => {
        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 text-center fade-in w-full">
                <div className="max-w-2xl w-full">
                    <button 
                        onClick={onBack}
                        className="self-start mb-6 text-gray-500 hover:text-blue-600 font-bold flex items-center gap-2 transition"
                    >

                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">

                        </button>

                        <button
                            onClick={() => onSelectCategory('vocab-list')}
                            className="bg-gradient-to-br from-orange-500 to-orange-700 text-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:scale-105 flex flex-col items-center gap-4 group"
                        >
                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">
                                <i className="fas fa-font text-3xl"></i>
                            </div>
                            <h3 className="text-2xl font-bold khmer-text">វាក្យសព្ទ (Vocabulary)</h3>
                            <p className="opacity-80 text-sm khmer-text">ពាក្យគន្លឹះ និងឧទាហរណ៍</p>
                        </button>
                    </div>
                </div>
            </div>
        );

    // New Component: Grammar Tips Screen
    const GrammarTipsScreen = ({ onBack }) => {
        return (
            <div className="flex flex-col min-h-screen bg-gray-50 w-full">
                <div className="bg-white shadow-md p-4 sticky top-0 z-10">
                    <div className="max-w-3xl mx-auto flex items-center gap-3">
                        <button onClick={onBack} className="text-gray-500 hover:text-blue-600 transition">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <h2 className="text-xl font-bold text-gray-800 khmer-text">គន្លឹះវេយ្យាករណ៍</h2>
                    </div>
                </div>

                <div className="flex-1 p-4 max-w-3xl mx-auto w-full fade-in pb-20 custom-scroll overflow-y-auto">
                    <div className="space-y-6">
                        {grammarTipsData.map((tip, index) => (
                            <div key={index} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="bg-blue-50 p-4 border-b border-blue-100">
                                    <h3 className="text-lg font-bold text-blue-900 khmer-text">{tip.title}</h3>
                                </div>
                                <div className="p-5">
                                    <p className="text-gray-700 mb-3 khmer-text">{tip.content}</p>
                                    <div className="bg-gray-50 p-3 rounded-lg border border-gray-200 mb-4 font-mono text-sm text-blue-600">

                                    </div>
                                    <div className="space-y-2">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Examples:</p>
                                        <ul className="list-disc list-inside space-y-1 text-gray-800 text-sm">
                                            {tip.examples.map((ex, i) => (
                                                <li key={i} dangerouslySetInnerHTML={{__html: ex}}></li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // New Component: Vocabulary List Screen
    const VocabularyListScreen = ({ onBack }) => {
        const [searchTerm, setSearchTerm] = useState("");
        
        const filteredVocab = vocabularyData.filter(v => 
            v.word.toLowerCase().includes(searchTerm.toLowerCase()) || 
            v.meaning.includes(searchTerm)
        );

        return (
            <div className="flex flex-col min-h-screen bg-gray-50 w-full">
                <div className="bg-white shadow-md p-4 sticky top-0 z-10 space-y-3">
                    <div className="max-w-3xl mx-auto flex items-center gap-3">
                        <button onClick={onBack} className="text-gray-500 hover:text-blue-600 transition">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <h2 className="text-xl font-bold text-gray-800 khmer-text">បញ្ជីវាក្យសព្ទ</h2>
                    </div>
                    <div className="max-w-3xl mx-auto relative">
                        <i className="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input 
                            type="text" 
                            placeholder="ស្វែងរកពាក្យ..." 
                            className="w-full pl-10 pr-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:border-blue-500 khmer-text"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                    </div>
                </div>

                <div className="flex-1 p-4 max-w-3xl mx-auto w-full fade-in pb-20 custom-scroll overflow-y-auto">
                    <div className="grid grid-cols-1 gap-3">
                        {filteredVocab.map((v, index) => (
                            <div key={index} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-lg font-bold text-indigo-700">{v.word}</h3>
                                    <span className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded khmer-text">{v.meaning}</span>
                                </div>
                                <p className="text-sm text-gray-500 italic border-l-2 border-indigo-200 pl-3">
                                    "{v.example}"
                                </p>
                            </div>
                        ))}
                        {filteredVocab.length === 0 && (
                            <div className="text-center text-gray-400 py-10 khmer-text">
                                មិនមានពាក្យដែលអ្នកស្វែងរកទេ
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    // New Component: Writing Screen
    const WritingScreen = ({ year, onBack }) => {
        // Find the specific writing outline for the selected year
        const data = writingData.find(item => item.year.toString() === year.toString());

        return (
            <div className="flex flex-col min-h-screen bg-gray-50 w-full">
                <div className="bg-white shadow-md p-4 sticky top-0 z-10">
                    <div className="max-w-3xl mx-auto flex items-center gap-3">
                        <button onClick={onBack} className="text-gray-500 hover:text-blue-600 transition">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <h2 className="text-xl font-bold text-gray-800 khmer-text">សំណេរ (Writing) - {year}</h2>
                    </div>
                </div>

                <div className="flex-1 p-4 max-w-3xl mx-auto w-full fade-in pb-20 custom-scroll overflow-y-auto">
                    {data ? (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
                            <div className="bg-indigo-50 p-4 border-b border-indigo-100 flex justify-between items-center">
                                <h3 className="text-lg font-bold text-indigo-900 khmer-text">
                                    Topic: {data.topic}
                                </h3>
                            </div>
                            <div className="p-5 space-y-4">
                                {data.outline.map((part, i) => (
                                    <div key={i} className="border-l-4 border-indigo-300 pl-3">
                                        <h4 className="text-sm font-bold text-gray-500 uppercase mb-1">{part.title}</h4>
                                        <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-line">{part.content}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="text-center text-gray-500 mt-10">
                            <p>មិនទាន់មានទិន្នន័យសំណេរសម្រាប់ឆ្នាំនេះទេ។</p>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // New Component: Year Menu Screen
    const YearMenuScreen = ({ onSelectYear, onBack }) => {
        // Generate years list, explicitly excluding 2020 and including 2014 (1) & (2)
        const years = [
            2025, 2024, 2023, 2022, 2021, 
            2019, 2018, 2017, 2016, 2015, 
            "2014 (2)", "2014 (1)"
        ];

        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 text-center fade-in w-full">
                <div className="max-w-4xl w-full">
                    <button 
                        onClick={onBack}
                        className="self-start mb-6 text-gray-500 hover:text-blue-600 font-bold flex items-center gap-2 transition"
                    >
                        <i className="fas fa-arrow-left"></i> ត្រឡប់ក្រោយ
                    </button>
                    
                    <h2 className="text-3xl font-bold text-gray-800 mb-8 khmer-text">ជ្រើសរើសឆ្នាំវិញ្ញាសា</h2>
                    
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {years.map(year => (
                            <button
                                key={year}
                                onClick={() => onSelectYear(year)}
                                className="bg-white hover:bg-indigo-50 border-2 border-indigo-100 hover:border-indigo-500 text-indigo-900 font-bold py-6 px-4 rounded-2xl shadow-md transition-all duration-200 transform hover:scale-105 flex flex-col items-center justify-center gap-2 group"
                            >
                                <span className="text-2xl font-mono">{year}</span>
                                <span className="text-xs text-gray-400 group-hover:text-indigo-600 font-normal">BacII Exam</span>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // New Component: Category Menu Screen
    const CategoryMenuScreen = ({ selectedYear, onSelectCategory, onBack }) => {
        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 text-center fade-in w-full">
                <div className="max-w-2xl w-full">
                    <button 
                        onClick={onBack}
                        className="self-start mb-6 text-gray-500 hover:text-blue-600 font-bold flex items-center gap-2 transition"
                    >
                        <i className="fas fa-arrow-left"></i> ត្រឡប់ទៅឆ្នាំវិញ
                    </button>

                    <h2 className="text-3xl font-bold text-gray-800 mb-2 khmer-text">វិញ្ញាសាឆ្នាំ {selectedYear}</h2>
                    <p className="text-gray-500 mb-8 khmer-text">សូមជ្រើសរើសផ្នែកដែលចង់ធ្វើតេស្ត</p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Grammar Button */}
                        <button
                            onClick={() => onSelectCategory('Grammar')}
                            className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:scale-105 flex flex-col items-center gap-4 group"
                        >
                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">
                                <i className="fas fa-spell-check text-3xl"></i>
                            </div>
                            <h3 className="text-xl font-bold">Grammar</h3>
                            <p className="opacity-80 text-sm">វេយ្យាករណ៍</p>
                        </button>

                        {/* Vocabulary Button */}
                        <button
                            onClick={() => onSelectCategory('Vocabulary')}
                            className="bg-gradient-to-br from-purple-500 to-purple-700 text-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:scale-105 flex flex-col items-center gap-4 group"
                        >
                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">
                                <i className="fas fa-book text-3xl"></i>
                            </div>
                            <h3 className="text-xl font-bold">Vocabulary</h3>
                            <p className="opacity-80 text-sm">វាក្យសព្ទ</p>
                        </button>

                        {/* Reading Button */}
                        <button
                            onClick={() => onSelectCategory('Reading')}
                            className="bg-gradient-to-br from-teal-500 to-teal-700 text-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:scale-105 flex flex-col items-center gap-4 group"
                        >
                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">
                                <i className="fas fa-book-reader text-3xl"></i>
                            </div>
                            <h3 className="text-xl font-bold">Reading</h3>
                            <p className="opacity-80 text-sm">បំណិនអាន</p>
                        </button>

                        {/* Writing Button - ADDED */}
                        <button
                            onClick={() => onSelectCategory('Writing')}
                            className="bg-gradient-to-br from-pink-500 to-pink-700 text-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:scale-105 flex flex-col items-center gap-4 group md:col-span-3"
                        >
                            <div className="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center group-hover:bg-opacity-30 transition">
                                <i className="fas fa-pen-nib text-3xl"></i>
                            </div>
                            <h3 className="text-xl font-bold">Writing Outlines</h3>
                            <p className="opacity-80 text-sm">គម្រោងតែងសេចក្ដី</p>
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const QuizScreen = ({ questionData, currentQuestionIndex, totalQuestions, onAnswer, timer, score, streak, year, category, onBack }) => {
        return (
            <div className="flex flex-col min-h-screen bg-gray-50 w-full">
                {/* Header */}
                <div className="bg-white shadow-md p-4 sticky top-0 z-10">
                    <div className="max-w-3xl mx-auto flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="text-gray-400 hover:text-gray-700 transition">
                                <i className="fas fa-arrow-left"></i>
                            </button>
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold text-sm">
                                    {currentQuestionIndex + 1}/{totalQuestions}
                                </div>
                                <div className="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full font-bold text-sm flex items-center gap-1">
                                    <i className="fas fa-star text-yellow-500"></i> {score}
                                </div>
                            </div>
                        </div>
                        <div className={`font-mono text-xl font-bold flex items-center gap-2 ${timer <= 10 ? 'text-red-500 animate-pulse' : 'text-blue-600'}`}>
                            <i className="far fa-clock"></i> {timer}s
                        </div>
                    </div>
                    {/* Progress Bar */}
                    <div className="w-full bg-gray-200 h-2 mt-4 rounded-full overflow-hidden max-w-3xl mx-auto">
                        <div 
                            className="bg-blue-600 h-full transition-all duration-500"
                            style={{ width: `${((currentQuestionIndex) / totalQuestions) * 100}%` }}
                        ></div>
                    </div>
                </div>

                {/* Question Content */}
                <div className="flex-1 flex flex-col items-center justify-center p-4 max-w-3xl mx-auto w-full fade-in">
                    
                    {/* Streak Badge */}
                    {streak >= 3 && (
                        <div className="mb-4 bg-orange-500 text-white px-4 py-1 rounded-full text-sm font-bold animate-bounce shadow-lg flex items-center gap-2">
                            <i className="fas fa-fire"></i> {streak} Streak!
                        </div>
                    )}

                    <div className="bg-white rounded-2xl shadow-xl p-6 md:p-10 w-full relative overflow-hidden">
                         {/* Watermark Icon */}
                         <div className="absolute top-0 right-0 opacity-5 pointer-events-none p-4">
                            <i className="fas fa-book-open text-9xl text-gray-100"></i>
                        </div>

                        <div className="flex justify-between items-center mb-4">
                            <span className="text-sm font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2">
                               <i className="far fa-calendar-alt"></i> {year}
                            </span>
                            <span className="bg-indigo-100 text-indigo-800 text-xs px-3 py-1 rounded-full font-bold uppercase shadow-sm">
                                {category}
                            </span>
                        </div>
                        
                        <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-relaxed">
                            {questionData.question}
                        </h2>

                        <div className="grid grid-cols-1 gap-4">
                            {questionData.options.map((option, index) => (
                                <button
                                    key={index}
                                    onClick={() => onAnswer(option)}
                                    className="text-left bg-gray-50 hover:bg-blue-50 border-2 border-gray-200 hover:border-blue-400 text-gray-700 font-semibold py-4 px-6 rounded-xl transition-all duration-200 transform hover:translate-x-2 flex items-center group"
                                >
                                    <span className="bg-gray-200 group-hover:bg-blue-200 text-gray-600 group-hover:text-blue-800 w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-bold">
                                        {String.fromCharCode(65 + index)}
                                    </span>
                                    {option}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const FeedbackModal = ({ isCorrect, correctAnswer, explanation, onNext }) => {
        return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                <div className={`bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md text-center transform transition-all scale-100 ${isCorrect ? 'border-b-8 border-green-500' : 'border-b-8 border-red-500'}`}>
                    <div className={`w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 ${isCorrect ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`}>
                        <i className={`fas ${isCorrect ? 'fa-check' : 'fa-times'} text-4xl`}></i>
                    </div>
                    
                    <h2 className={`text-2xl font-bold mb-2 khmer-text ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                        {isCorrect ? 'ត្រឹមត្រូវ!' : 'មិនត្រឹមត្រូវ!'}
                    </h2>
                    
                    {!isCorrect && (
                        <div className="mb-4">
                            <p className="text-gray-500 text-sm mb-1">ចម្លើយដែលត្រូវគឺ៖</p>
                            <p className="text-lg font-bold text-gray-800">{correctAnswer}</p>
                        </div>
                    )}

                    <div className="bg-gray-50 p-4 rounded-lg text-left mb-6 border border-gray-100">
                        <p className="text-xs text-gray-400 font-bold uppercase mb-2">ការពន្យល់ (Explanation)</p>
                        <p className="text-sm text-gray-700 khmer-text leading-relaxed">{explanation}</p>
                    </div>

                    <button 
                        onClick={onNext}
                        className={`w-full py-3 px-6 rounded-xl font-bold text-white shadow-lg transition transform hover:scale-105 khmer-text flex items-center justify-center gap-2 ${isCorrect ? 'bg-green-500 hover:bg-green-600' : 'bg-red-500 hover:bg-red-600'}`}
                    >
                        បន្តទៅមុខ <i className="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        );
    };

    const ResultScreen = ({ score, totalQuestions, onRestart, onHome }) => {
        const percentage = totalQuestions > 0 ? Math.round((score / totalQuestions) * 100) : 0;
        let message = "";
        let color = "";
        let icon = "";

        if (percentage >= 90) {
            message = "អស្ចារ្យណាស់! និទ្ទេស A";
            color = "text-green-600";
            icon = "fa-trophy";
        } else if (percentage >= 75) {
            message = "ល្អណាស់! និទ្ទេស B";
            color = "text-blue-600";
            icon = "fa-medal";
        } else if (percentage >= 50) {
            message = "ល្អបង្គួរ! និទ្ទេស C/D";
            color = "text-yellow-600";
            icon = "fa-thumbs-up";
        } else {
            message = "ខិតខំប្រឹងប្រែងបន្ថែមទៀតណា!";
            color = "text-red-600";
            icon = "fa-book-reader";
        }

        return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 text-center fade-in w-full">
                <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl max-w-lg w-full">
                    <div className={`mb-6 flex justify-center text-6xl ${color}`}>
                        <i className={`fas ${icon} animate-bounce`}></i>
                    </div>
                    <h2 className="text-3xl font-bold text-gray-800 mb-2 khmer-text">លទ្ធផលរបស់អ្នក</h2>
                    <div className="text-6xl font-bold text-gray-900 my-6">
                        {score}<span className="text-2xl text-gray-400">/{totalQuestions}</span>
                    </div>
                    <p className={`text-xl mb-8 font-bold khmer-text ${color}`}>
                        {message}
                    </p>
                    
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-gray-100 p-4 rounded-xl">
                            <p className="text-gray-500 text-sm">ពិន្ទុសរុប</p>
                            <p className="text-xl font-bold">{percentage}%</p>
                        </div>
                        <div className="bg-gray-100 p-4 rounded-xl">
                            <p className="text-gray-500 text-sm">បានបញ្ចប់</p>
                            <p className="text-xl font-bold">100%</p>
                        </div>
                    </div>

                    <div className="flex flex-col gap-3">
                        <button 
                            onClick={onRestart}
                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2 khmer-text"
                        >
                            <i className="fas fa-redo"></i> ធ្វើតេស្តម្ដងទៀត
                        </button>
                        <button 
                            onClick={onHome}
                            className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 px-8 rounded-xl transition flex items-center justify-center gap-2 khmer-text"
                        >
                            <i className="fas fa-home"></i> ទៅកាន់ម៉ឺនុយដើម
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
        // Game States: 'welcome', 'tips-menu', 'grammar-tips', 'vocab-list', 'year-menu', 'category-menu', 'playing', 'playing-reading', 'writing-screen', 'feedback', 'result', 'goodbye'
        const [gameState, setGameState] = useState('welcome');
        
        // Selections
        const [selectedYear, setSelectedYear] = useState(null);
        const [selectedCategory, setSelectedCategory] = useState(null);
        const [activeQuestions, setActiveQuestions] = useState([]); // Questions filtered by Year & Category
        const [activeReading, setActiveReading] = useState(null);
        const [readingAnswers, setReadingAnswers] = useState({}); // { gapIndex: "answer" }
        const [showReadingResult, setShowReadingResult] = useState(false);
        const [readingScore, setReadingScore] = useState(0);

        // Drag and Drop State
        const [draggedWord, setDraggedWord] = useState(null); // { word: string, sourceIndex: number|null (null = box) }

        // Gameplay States
        const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
        const [score, setScore] = useState(0);
        const [streak, setStreak] = useState(0);
        const [timer, setTimer] = useState(60);
        const [lastAnswerCorrect, setLastAnswerCorrect] = useState(false);
        const [isMusicPlaying, setIsMusicPlaying] = useState(false);
        
        const bgMusicRef = useRef(null);
        
        // Audio synthesis
        const playSound = (type) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1046.5, ctx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } else if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            }
        };

        // Timer Logic
        useEffect(() => {
            let interval;
            if (gameState === 'playing' && timer > 0) {
                interval = setInterval(() => {
                    setTimer((prev) => prev - 1);
                }, 1000);
            } else if (timer === 0 && gameState === 'playing') {
                handleTimeOut();
            }
            return () => clearInterval(interval);
        }, [gameState, timer]);

        // --- NAVIGATION HANDLERS ---
        
        const handleStartApp = () => {
            playSound('click');
            setGameState('year-menu');
            
            // Try to play music if not playing (OFFLINE MODE CHECK: If file not found, catch error silently)
            if(bgMusicRef.current && !isMusicPlaying) {
                bgMusicRef.current.volume = 0.2; 
                bgMusicRef.current.play().then(() => {
                    setIsMusicPlaying(true);
                }).catch(e => console.log("Audio prevented or offline"));
            }
        };

        const handleTipsMenu = () => {
            playSound('click');
            setGameState('tips-menu');
        };

        const handleSelectTipCategory = (category) => {
            playSound('click');
            setGameState(category); // 'grammar-tips' or 'vocab-list'
        };

        const handleBackToTipsMenu = () => {
            playSound('click');
            setGameState('tips-menu');
        }

        const handleSelectYear = (year) => {
            playSound('click');
            setSelectedYear(year);
            setGameState('category-menu');
        };

        const handleSelectCategory = (category) => {
            playSound('click');
            setSelectedCategory(category);
            
            if (category === 'Reading') {
                handleSelectReading(selectedYear);
                return;
            }
            if (category === 'Writing') {
                setGameState('writing-screen');
                return;
            }

            // Filter questions based on selection
            const filtered = allQuestionsData.filter(q => q.year.toString() === selectedYear.toString() && q.category === category);
            
            setActiveQuestions(filtered);
            setScore(0);
            setStreak(0);
            setCurrentQuestionIndex(0);
            setTimer(60);
            
            if (filtered.length > 0) {
                setGameState('playing');
            } else {
                 setGameState('result');
            }
        };

        const handleSelectReading = (year) => {
            const data = readingData.find(d => d.year.toString() === year.toString());
            if (data) {
                setActiveReading(data);
                setReadingAnswers({});
                setShowReadingResult(false);
                setReadingScore(0);
                setGameState('playing-reading');
            } else {
                alert("Reading section coming soon for this year!");
            }
        };

        // --- DRAG AND DROP HANDLERS ---
        const handleDragStart = (e, word, sourceIndex) => {
            setDraggedWord({ word, sourceIndex });
            e.dataTransfer.setData("text/plain", word); // For standard HTML5 DnD compatibility
            e.dataTransfer.effectAllowed = "move";
        };

        const handleDragOver = (e) => {
            e.preventDefault(); // Necessary to allow dropping
            e.dataTransfer.dropEffect = "move";
        };

        const handleDrop = (e, targetIndex) => {
            e.preventDefault();
            if (!draggedWord) return;

            const newAnswers = { ...readingAnswers };

            // Logic: 
            // 1. If coming from another gap (sourceIndex !== null), remove from there.
            // 2. Place word in target gap.
            // 3. If target gap had a word, and we came from a gap, maybe swap? 
            //    (Let's just overwrite for simplicity, or swap if user intent is clear. Swap is better UX).
            
            const existingWordInTarget = newAnswers[targetIndex];

            // Remove from old location if it was a gap
            if (draggedWord.sourceIndex !== null) {
                delete newAnswers[draggedWord.sourceIndex];
            }

            // If we are swapping (Gap A -> Gap B, and Gap B had a word)
            if (existingWordInTarget && draggedWord.sourceIndex !== null) {
                newAnswers[draggedWord.sourceIndex] = existingWordInTarget;
            }

            // Place new word
            newAnswers[targetIndex] = draggedWord.word;

            setReadingAnswers(newAnswers);
            setDraggedWord(null);
            playSound('click');
        };

        const handleClearGap = (index) => {
            if (showReadingResult) return;
            const newAnswers = { ...readingAnswers };
            delete newAnswers[index];
            setReadingAnswers(newAnswers);
        };

        const submitReading = () => {
            let correctCount = 0;
            activeReading.answers.forEach((ans, index) => {
                if (readingAnswers[index] === ans) {
                    correctCount++;
                }
            });
            setReadingScore(correctCount);
            setShowReadingResult(true);
            if (correctCount === activeReading.answers.length) {
                playSound('correct');
            }
        };

        const renderReadingText = () => {
            if (!activeReading) return null;

            return (
                <div className="leading-relaxed text-lg text-gray-800 text-justify">
                    <h3 className="text-2xl font-bold text-center mb-6 text-blue-800">{activeReading.title}</h3>
                    
                    {/* Word Box Display - Draggable Sources */}
                    <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-100 mb-8 sticky top-20 z-10 shadow-md">
                        <p className="text-sm text-gray-500 mb-2 font-bold uppercase">Drag words from here:</p>
                        <div className="flex flex-wrap gap-2">
                            {activeReading.wordBox.map((word, i) => (
                                <div 
                                    key={i} 
                                    draggable={!showReadingResult}
                                    onDragStart={(e) => handleDragStart(e, word, null)}
                                    className={`bg-white px-4 py-2 rounded-lg text-blue-700 shadow-sm border border-blue-200 font-bold text-sm cursor-grab active:cursor-grabbing hover:bg-blue-100 transition transform hover:scale-105 select-none draggable-word`}
                                >
                                    {word}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Text with Drop Zones */}
                    <div className="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
                        {activeReading.segments.map((segment, index) => (
                            <React.Fragment key={index}>
                                <span dangerouslySetInnerHTML={{__html: segment}} />
                                {index < activeReading.answers.length && (
                                    <span 
                                        className={`drop-zone ${readingAnswers[index] ? 'filled' : ''} ${showReadingResult ? (readingAnswers[index] === activeReading.answers[index] ? 'correct' : 'wrong') : ''}`}
                                        onDragOver={!showReadingResult ? handleDragOver : undefined}
                                        onDrop={!showReadingResult ? (e) => handleDrop(e, index) : undefined}
                                        onClick={() => handleClearGap(index)}
                                    >
                                        {readingAnswers[index] ? (
                                            <span 
                                                draggable={!showReadingResult}
                                                onDragStart={(e) => {
                                                    e.stopPropagation(); // Prevent parent click
                                                    handleDragStart(e, readingAnswers[index], index);
                                                }}
                                                className="w-full text-center block"
                                            >
                                                {readingAnswers[index]}
                                            </span>
                                        ) : (
                                            <span className="text-gray-300 text-sm pointer-events-none">Drop Here</span>
                                        )}
                                        
                                        {showReadingResult && readingAnswers[index] !== activeReading.answers[index] && (
                                            <span className="text-red-500 text-xs ml-2 font-bold whitespace-nowrap">
                                                ({activeReading.answers[index]})
                                            </span>
                                        )}
                                    </span>
                                )}
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            );
        };

        const handleBackToYear = () => {
            playSound('click');
            setSelectedYear(null);
            setGameState('year-menu');
        };

        const handleBackToCategory = () => {
            playSound('click');
            setSelectedCategory(null);
            setGameState('category-menu');
        };

        const handleGoHome = () => {
            playSound('click');
            setSelectedYear(null);
            setSelectedCategory(null);
            setGameState('year-menu');
        };

        const handleExit = () => {
            playSound('click');
            setGameState('goodbye');
        }

        // --- GAMEPLAY HANDLERS ---

        const toggleMusic = () => {
            if (isMusicPlaying) {
                bgMusicRef.current.pause();
            } else {
                bgMusicRef.current.play();
            }
            setIsMusicPlaying(!isMusicPlaying);
        };

        const handleAnswer = (selectedOption) => {
            const currentQuestion = activeQuestions[currentQuestionIndex];
            const isCorrect = selectedOption === currentQuestion.answer;
            
            if (isCorrect) {
                playSound('correct');
                setScore(score + 1);
                setStreak(streak + 1);
            } else {
                playSound('wrong');
                setStreak(0);
            }

            setLastAnswerCorrect(isCorrect);
            setGameState('feedback');
        };

        const handleTimeOut = () => {
            playSound('wrong');
            setLastAnswerCorrect(false);
            setStreak(0);
            setGameState('feedback');
        };

        const handleNextQuestion = () => {
            playSound('click');
            if (currentQuestionIndex + 1 < activeQuestions.length) {
                setCurrentQuestionIndex(currentQuestionIndex + 1);
                setTimer(60); 
                setGameState('playing');
            } else {
                setGameState('result');
            }
        };

        const handleRestart = () => {
            playSound('click');
            setScore(0);
            setStreak(0);
            setCurrentQuestionIndex(0);
            setTimer(60);
            setGameState('playing');
        };

        return (
            <div className="relative min-h-screen bg-gray-50">
                {/* Background Music - Source removed for Offline safety, or keep local if available */}
                {/* <audio ref={bgMusicRef} loop>
                    <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg" />
                </audio> */}

                {/* Music Toggle - Hidden since audio is removed for offline */}
                {/* {gameState !== 'welcome' && gameState !== 'goodbye' && (
                    <button 
                        onClick={toggleMusic} 
                        className="fixed bottom-4 right-4 z-50 bg-white p-3 rounded-full shadow-lg text-gray-700 hover:text-blue-600 transition"
                    >
                        <i className={`fas ${isMusicPlaying ? 'fa-volume-up' : 'fa-volume-mute'}`}></i>
                    </button>
                )} 
                */}

                {gameState === 'welcome' && (
                    <WelcomeScreen 
                        onStart={handleStartApp} 
                        onTips={handleTipsMenu}
                        onExit={handleExit}
                    />
                )}

                {gameState === 'goodbye' && (
                    <GoodbyeScreen />
                )}
                
                {gameState === 'tips-menu' && (
                    <TipsMenuScreen 
                        onSelectCategory={handleSelectTipCategory} 
                        onBack={() => setGameState('welcome')} 
                    />
                )}

                {gameState === 'grammar-tips' && (
                    <GrammarTipsScreen onBack={handleBackToTipsMenu} />
                )}

                {gameState === 'vocab-list' && (
                    <VocabularyListScreen onBack={handleBackToTipsMenu} />
                )}

                {gameState === 'year-menu' && (
                    <YearMenuScreen 
                        onSelectYear={handleSelectYear}
                        onBack={() => setGameState('welcome')}
                    />
                )}

                {gameState === 'category-menu' && (
                    <CategoryMenuScreen 
                        selectedYear={selectedYear}
                        onSelectCategory={handleSelectCategory}
                        onBack={handleBackToYear}
                    />
                )}
                
                {gameState === 'playing' && (
                    <QuizScreen 
                        questionData={activeQuestions[currentQuestionIndex]}
                        currentQuestionIndex={currentQuestionIndex}
                        totalQuestions={activeQuestions.length}
                        onAnswer={handleAnswer}
                        timer={timer}
                        score={score}
                        streak={streak}
                        year={selectedYear}
                        category={selectedCategory}
                        onBack={handleBackToCategory}
                    />
                )}

                {gameState === 'playing-reading' && activeReading && (
                    <div className="flex flex-col min-h-screen bg-gray-50 w-full">
                        {/* Header */}
                        <div className="bg-white shadow-md p-4 sticky top-0 z-20">
                            <div className="max-w-4xl mx-auto flex justify-between items-center">
                                <button onClick={() => setGameState('category-menu')} className="text-gray-500 hover:text-blue-600">
                                    <i className="fas fa-arrow-left"></i> Back
                                </button>
                                <div className="text-lg font-bold text-blue-800">
                                    {activeReading.year} - Reading
                                </div>
                                <div className="w-10"></div> {/* Spacer */}
                            </div>
                        </div>

                        {/* Content */}
                        <div className="flex-1 p-4 max-w-4xl mx-auto w-full fade-in pb-24">
                            {renderReadingText()}
                        </div>

                        {/* Footer / Controls */}
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg z-20">
                            <div className="max-w-4xl mx-auto flex justify-between items-center">
                                {showReadingResult ? (
                                    <div className="flex items-center gap-4 w-full justify-between">
                                        <div className="text-xl font-bold">
                                            Score: <span className={readingScore >= activeReading.answers.length / 2 ? "text-green-600" : "text-red-600"}>
                                                {readingScore} / {activeReading.answers.length}
                                            </span>
                                        </div>
                                        <button 
                                            onClick={() => handleSelectReading(selectedYear)} // Restart
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg"
                                        >
                                            <i className="fas fa-redo mr-2"></i> Try Again
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={submitReading}
                                        className="w-full bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition transform active:scale-95"
                                    >
                                        <i className="fas fa-check-circle mr-2"></i> Submit Answers
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {gameState === 'writing-screen' && (
                    <WritingScreen year={selectedYear} onBack={handleBackToCategory} />
                )}

                {gameState === 'feedback' && (
                    <FeedbackModal 
                        isCorrect={lastAnswerCorrect}
                        correctAnswer={activeQuestions[currentQuestionIndex].answer}
                        explanation={activeQuestions[currentQuestionIndex].explanation}
                        onNext={handleNextQuestion}
                    />
                )}

                {gameState === 'result' && (
                    <ResultScreen 
                        score={score}
                        totalQuestions={activeQuestions.length}
                        onRestart={handleRestart}
                        onHome={handleGoHome}
                    />
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
